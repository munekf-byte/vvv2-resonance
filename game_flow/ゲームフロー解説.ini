ゲームフロー解説 


通常時
AT獲得までの流れ
通常時のプレイからメインAT「東京喰種咬（トウキョウグールバイツ）」を獲得するまでの流れは、主に**「規定ゲーム数の消化」「レア役からの当選」「AT直撃・確定役」**という3つのルートに集約されます
。
その詳細なプロセスを以下のステップで解説します。
1. 通常時の基本：モードと内部状態の把握
通常時は、AT当選のチャンスとなるCZ（チャンスゾーン）やエピソードボーナスを、いかに早く引き当てるかが鍵となります。
モード管理と規定ゲーム数: 通常時には6種類のモード（通常A/B/C、チャンス、天国準備、天国）が存在し、それぞれCZ当選の期待度が高い「ゾーン」や「天井」が設定されています
。
ゲーム数の加算: 液晶右下のゲーム数は1G消化ごとに進みますが、スイカ成立時にはゲーム数の加算抽選（10G/100G/MAX600G）が行われるため、実ゲーム数より早く天井やゾーンに到達することがあります
。
内部状態（通常・高確・超高確）: リプレイや弱チェリーによって状態が移行し、上位の状態ほどレア役によるCZ当選率がアップします
。
2. 前兆と告知：東京上空と精神世界
規定ゲーム数やレア役で当選した場合、前兆ステージを経て告知が行われます。
東京上空（前兆ステージ）: 規定ゲーム数消化後などに移行する基本の前兆ステージです
。オーラの色が上がるほど期待度が高まり、最終的に連続演出を経て合否が告知されます
。
精神世界（超高確ステージ）: 移行すれば超高確濃厚となり、滞在中にレア役を引ければCZ当選の大きなチャンスとなります
。ここでの当選は当該ゲームで告知されるため、自力の叩きどころとなります
。
3. チェリー高確：赫眼（かくがん）状態
下段リプレイ（出現率1/1260.3〜1/1024.0）が揃うと、**「赫眼状態」**というチェリー高確に突入します
。
性能: 10G〜50G継続し、滞在中のレア役確率は約1/2.6まで大幅にアップします
。
恩恵: 規定ゲーム数の前兆中やCZ中に引くことで、強引に当選や成功を勝ち取ることが可能です。
4. 自力でATを掴み取る：2種類のCZ
通常時の初当たりの多くは、まず以下のいずれかのCZに突入します。
レミニセンス（期待度 約52%）: 8G間のCZで、ベルやレア役でATを抽選します
。最終ゲームでレア役を引けば成功濃厚です
。
大喰いの利世（期待度 約75%）: 同じく8G継続ですが、リプレイでも約26%で当選するなど、レミニセンスよりも成功率が高い上位CZです
。
昇格抽選: CZの本前兆中にレア役を引くと、CZ種別の格上げ抽選（レミニセンス→大喰いの利世→エピソードボーナス）が行われます
。
5. AT直行ルート：エピソードボーナスと確定役
CZを経由せず、直接ATが確定するルートも存在します。
エピソードボーナス: 通常時の抽選から直接当選することがあり、その時点でAT突入が濃厚となります
。消化中はATの差枚数上乗せ抽選が行われます
。
AT直撃: 通常時のリプレイ成立時に抽選されており、高設定ほど出現率が優遇されています（設定6で1/7036.8）
。
ロングフリーズ: 確定チェリー成立時の約1/6で発生し、初期枚数2000枚のATという強力な恩恵を得られます
。
6. AT突入：導入エピソード
CZ成功やボーナス終了後は、まず10G間の導入エピソードに突入します
。 ここでAT中のバトルの相手となる「喰種」が決定され、初期枚数約150枚（＋α）を持って、メインパートである「東京喰種咬」が始まります


AT中

スマスロ『L 東京喰種』のメインAT**「東京喰種咬（トウキョウグールバイツ）」**は、純増約4.0枚/Gの差枚数管理型ATです
。ATのプレイの流れを詳細に解説します。
1. AT突入と導入エピソード
AT当選時は、まず約10G間の導入エピソードからスタートします
。
初期枚数: 基本的に約150枚を持ってメインパートへ突入します
。
対戦相手決定: この導入パートで、AT中の鍵となる「喰種対決」の対戦相手が決定されます
。
上乗せ抽選: 導入エピソード消化中もレア役で差枚数の直乗せ抽選が行われます。また、通常時から「赫眼状態」を引き継いでいた場合、この10G間は赫眼状態のゲーム数減算がストップするため有利になります
。
2. メインパート：差枚数消化と抽選
メインパートでは、獲得した差枚数を消化しながら、**「直乗せ」「内部状態移行」「喰種対決」**を目指します
。
直乗せ: レア役成立時に枚数上乗せを抽選します。強チェリーやチャンス目は上乗せ濃厚、確定チェリーなら300枚または500枚が濃厚となります
。
内部状態（高確）: スイカや弱チェリーなどで「喰種対決」の高確率状態への移行を抽選します。高確中はレア役による対決当選率が大幅にアップします
。
喰種対決の抽選: レア役による抽選のほか、**15G刻みの規定ゲーム数消化（最大150G）**でも対決に発展します
。
3. 自力勝利を目指す「喰種対決」
AT中のレア役やゲーム数消化から突入する、4G＋α継続のバトル型CZです
。
成功期待度: 平均約50%
。
勝利抽選: 消化中の成立役に応じて勝利を抽選します。リプレイやレア役を引ければチャンスで、強レア役なら勝利濃厚です
。
勝利報酬: 勝利すれば報酬獲得ゾーン**「BITES（バイツ）」**へ突入します。有馬貴将との対決に勝利した場合は、上位CZ「有馬貴将ジャッジメント」を獲得します
。
4. 報酬獲得ゾーン「BITES」
小役（1/2.2）を引き続ける限り、毎ゲーム報酬の差枚数がアップしていくゾーンです
。
仕組み: ハズレを引くまで継続し、ベルやリプレイで1段階、レア役なら複数段階のアップが期待できます
。
終了とリトライ: ハズレで終了となりますが、約20%でリトライ（継続）が発生します
。
上位版: 大量上乗せに期待できる**「超BITES」や、2000枚獲得濃厚となる「極BITES」**も存在します
。
5. 特化ゾーン「百足覚醒」と「隻眼の梟」
AT中に約1/2048で成立する**「喰図柄揃い」**から突入する強力な特化ゾーンです
なお、ムカデ覚醒及び赤眼の複露が発生した場合、グール対決に勝利し、次のラウンドへと進む状態と同じ扱いになります。つまり当該ラウンドはクリアとなります。
。
百足覚醒: 5回の上乗せが発生し、ループ抽選も行われます。期待獲得枚数は約300枚
。
隻眼の梟: 1G完結の最強特化ゾーンで、300枚〜2000枚を上乗せします。期待獲得枚数は約500枚
。
6. ツラヌキ要素：有馬貴将ジャッジメント
ATを完走（エンディング到達）するか、喰種対決で有馬貴将を撃破すると突入する5G間の上位CZです
。
成功期待度: 約61%
。
成功時の恩恵: 上乗せ特化ゾーン**「CCGの死神」**に突入し、300枚〜2000枚を上乗せしてATに再突入します
なお、当該ATの初当たりが裏ATとなる確率は設定に準じて高くなると推定されています。
。
7. 最強の状態「裏AT」
AT画面がネガポジ反転すると突入の合図です
。
特徴: 喰種対決の勝利期待度が大幅にアップし、期待枚数は約3430枚（突入までの獲得分を含む）に及びます
。
突入契機: 「CCGの死神」成功時の一部（レア役成功なら濃厚）や、初当たりAT時の一部で突入します
。
AT終了後は、設定に応じて引き戻し抽選が行われます。当選時は前兆を経てATに復帰します
 ATの引き戻し確率は設定に準じて高くなると推定されています。